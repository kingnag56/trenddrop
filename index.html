<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Earn Money App</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
.profile{margin-top:20px;}
.logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(45deg,#22c55e,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:30px;margin:auto;}
.box{background:#1e293b;margin:15px;padding:15px;border-radius:12px;}
button{padding:12px;border:none;background:#22c55e;color:white;font-size:16px;border-radius:8px;width:80%;margin-top:10px;}
input{padding:10px;width:80%;border-radius:8px;border:none;}
.progress{width:80%;height:10px;background:#334155;margin:auto;border-radius:10px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:#22c55e;}
</style>
</head>
<body>

<div class="profile">
<div class="logo">RN</div>
<h2>Rajaram Earn</h2>
</div>

<div class="box">
<h3>Login / Register</h3>
<input id="regUser" placeholder="Username"><br>
<input id="regPass" placeholder="Password" type="password"><br>
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div class="box">
<h3>💰 Balance</h3>
<h1>₹<span id="money">0</span></h1>
</div>

<div class="box">
<h3>🎬 Watch Ads</h3>
<div class="progress"><div class="progress-bar" id="bar"></div></div>
<button onclick="watchAd()">Watch Ad & Earn ₹2</button>
</div>

<div class="box">
<h3>🎁 Daily Bonus</h3>
<button onclick="bonus()">Claim ₹5</button>
</div>

<div class="box">
<h3>💸 Withdraw</h3>
<input type="text" id="upi" placeholder="Enter UPI ID"><br>
<button onclick="withdraw()">Withdraw</button>
</div>

<script>
let user="", ref="";
let backend="http://127.0.0.1:4040"; // Replace with your Ngrok HTTPS URL
if(location.search.includes("ref=")) ref = new URLSearchParams(location.search).get("ref");

// Register
function register(){
  user=document.getElementById("regUser").value;
  let pass=document.getElementById("regPass").value;
  fetch(`${backend}/auth.php?action=register&user=${user}&pass=${pass}&ref=${ref}`)
  .then(res=>res.json()).then(data=>alert(data.msg));
}

// Login
function login(){
  user=document.getElementById("regUser").value;
  let pass=document.getElementById("regPass").value;
  fetch(`${backend}/auth.php?action=login&user=${user}&pass=${pass}`)
  .then(res=>res.json()).then(data=>{
    if(data.status=="success"){ alert("Login success"); loadBalance(); }
    else alert(data.msg);
  });
}

// Watch Ad (secure)
function watchAd(){
  if(!user){ alert("Login first"); return; }

  // Step 1: Get a unique token from backend
  fetch(`${backend}/adtoken.php?user=${user}`)
  .then(res=>res.json())
  .then(data=>{
    if(data.status=="success"){
      let token = data.token;

      // Step 2: Open ad URL
      let adUrl = " https://www.profitablecpmratenetwork.com/iqfqebmd?key=12db6db0abb5a4df856c870d575520b9"; // Replace with real ad URL
      let adWindow = window.open(adUrl,"_blank","width=400,height=600");

      let checkAd = setInterval(()=>{
        if(adWindow.closed){
          clearInterval(checkAd);
          // Step 3: Call earn.php with token
          fetch(`${backend}/earn.php?user=${user}&token=${token}`)
          .then(res=>res.text())
          .then(()=>loadBalance());
          alert("Ad watched! Coins added.");
        }
      },1000);
    }
  });
}

// Bonus
function bonus(){
  if(!user){ alert("Login first"); return; }
  fetch(`${backend}/bonus.php?user=${user}`).then(()=>loadBalance());
}

// Withdraw
function withdraw(){
  if(!user){ alert("Login first"); return; }
  let upi=document.getElementById("upi").value;
  if(!upi){ alert("Enter UPI ID"); return; }
  fetch(`${backend}/withdraw.php?user=${user}&upi=${upi}`).then(()=>alert("Withdraw requested"));
}

// Load balance
function loadBalance(){
  if(!user) return;
  fetch(`${backend}/balance.php?user=${user}`).then(res=>res.text()).then(data=>document.getElementById("money").innerText=data);
}

window.onload=loadBalance;
</script>
</body>
</html>
